<!DOCTYPE html>
<html>
<head>
    <title>Generate SD Favicon</title>
</head>
<body>
    <h1>SD Favicon Generator</h1>
    <canvas id="canvas" width="256" height="256"></canvas>
    <br><br>
    <button onclick="downloadFavicon()">Download favicon.ico</button>
    <br><br>
    <p>Instructions:</p>
    <ol>
        <li>Open this file in a browser</li>
        <li>Click "Download favicon.ico"</li>
        <li>Save the file as "favicon.ico" in the public/ folder</li>
        <li>Replace the existing favicon.ico</li>
    </ol>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Draw background (teal color)
        ctx.fillStyle = '#0f766e';
        ctx.fillRect(0, 0, 256, 256);

        // Draw rounded corners
        ctx.globalCompositeOperation = 'destination-in';
        ctx.beginPath();
        ctx.roundRect(0, 0, 256, 256, 32);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // Draw SD text
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 140px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SD', 128, 140);

        function downloadFavicon() {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'favicon.ico';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('Favicon downloaded! Now:\n1. Save it to public/favicon.ico\n2. Run: git add public/favicon.ico\n3. Run: git commit -m "Replace Lovable favicon with SD logo"\n4. Run: git push');
            }, 'image/png');
        }
    </script>
</body>
</html>
